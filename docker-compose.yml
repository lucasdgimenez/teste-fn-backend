services:

  testefnbackend_app_fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: testefnbackend_app_fpm
    volumes:
      - .:/var/www/html
    networks:
      - testefnbackend_network
    depends_on:
      testefnbackend_app_db:
        condition: service_healthy

  testefnbackend_app_db:
    image: mariadb:11
    container_name: testefnbackend_app_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testefnbackend_network

  testefnbackend_app_nginx:
    image: nginx:alpine
    container_name: testefnbackend_app_nginx
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    networks:
      - testefnbackend_network
    depends_on:
      - testefnbackend_app_fpm

networks:
  testefnbackend_network:
    driver: bridge

volumes:
  db_data:
